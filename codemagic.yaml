workflows:
  android-workflow:
    name: Android Build
    max_build_duration: 30
    environment:
      flutter: 3.13.9
    scripts:
      - name: Get dependencies
        script: flutter pub get
      - name: Build APK
        script: flutter build apk --debug
    artifacts:
      - build/app/outputs/flutter-apk/app-debug.apk
