name: zhanzi_helper
description: 占察助手 - 基于佛教占察法门的移动应用

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # 状态管理
  provider: ^6.1.1
  
  # 本地存储
  sqflite: ^2.3.0
  path: ^1.8.3
  shared_preferences: ^2.2.2
  
  # 文件选择器
  file_picker: ^6.1.1
  path_provider: ^2.1.1
  
  # UI组件
  cupertino_icons: ^1.0.6
  
  # 日期格式化
  intl: ^0.18.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/
    - assets/lunxiang_explanations.json
